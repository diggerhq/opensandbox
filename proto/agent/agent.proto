syntax = "proto3";

package agent;

option go_package = "github.com/opensandbox/opensandbox/proto/agent";

// SandboxAgent runs inside each Firecracker microVM and handles
// exec, file ops, PTY, and stats over gRPC via vsock.
service SandboxAgent {
  // Exec runs a command and returns the result after completion.
  rpc Exec(ExecRequest) returns (ExecResponse);

  // ExecStream runs a command and streams stdout/stderr chunks in real time.
  rpc ExecStream(ExecRequest) returns (stream ExecOutputChunk);

  // Filesystem operations
  rpc ReadFile(ReadFileRequest) returns (ReadFileResponse);
  rpc WriteFile(WriteFileRequest) returns (WriteFileResponse);

  // Streaming file operations for large files (256KB chunks over vsock gRPC)
  rpc ReadFileStream(ReadFileStreamRequest) returns (stream FileChunk);
  rpc WriteFileStream(stream WriteFileStreamRequest) returns (WriteFileStreamResponse);
  rpc ListDir(ListDirRequest) returns (ListDirResponse);
  rpc MakeDir(MakeDirRequest) returns (MakeDirResponse);
  rpc Remove(RemoveRequest) returns (RemoveResponse);
  rpc Exists(ExistsRequest) returns (ExistsResponse);
  rpc Stat(StatRequest) returns (StatResponse);

  // Stats returns live resource usage from /proc.
  rpc Stats(StatsRequest) returns (StatsResponse);

  // Ping verifies the agent is responsive.
  rpc Ping(PingRequest) returns (PingResponse);

  // PTY management (data flows over a separate vsock port per session)
  rpc PTYCreate(PTYCreateRequest) returns (PTYCreateResponse);
  rpc PTYResize(PTYResizeRequest) returns (PTYResizeResponse);
  rpc PTYKill(PTYKillRequest) returns (PTYKillResponse);

  // PTYAttach opens a bidirectional stream for PTY I/O over gRPC.
  // Used by QEMU backend (virtio-serial) where vsock data ports are unavailable.
  rpc PTYAttach(stream PTYInput) returns (stream PTYOutput);

  // Exec sessions — persistent command execution with scrollback and reconnect.
  rpc ExecSessionCreate(ExecSessionCreateRequest) returns (ExecSessionCreateResponse);
  rpc ExecSessionAttach(stream ExecSessionInput) returns (stream ExecSessionOutput);
  rpc ExecSessionList(ExecSessionListRequest) returns (ExecSessionListResponse);
  rpc ExecSessionKill(ExecSessionKillRequest) returns (ExecSessionKillResponse);

  // SetEnvs stores sandbox-level environment variables inside the agent.
  // These are injected into every subsequent Exec/ExecStream call,
  // between the base OS env and per-command envs.
  rpc SetEnvs(SetEnvsRequest) returns (SetEnvsResponse);

  // Shutdown gracefully terminates the agent and syncs disks.
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);

  // SyncFS flushes all filesystem buffers without exiting.
  // Used before snapshot to ensure disk state is consistent.
  rpc SyncFS(SyncFSRequest) returns (SyncFSResponse);

  // PrepareHibernate synchronously prepares the guest for hibernate/checkpoint:
  // syncs filesystems, flushes block device buffers, and quiesces the virtio-serial
  // listener so a clean Accept happens on wake/fork. Returns only after all work
  // completes — no sleep needed on the host side after this RPC.
  rpc PrepareHibernate(PrepareHibernateRequest) returns (PrepareHibernateResponse);

  // SetResourceLimits adjusts sandbox cgroup limits at runtime.
  // Used for elastic scaling — raise/lower memory, CPU, pids without restart.
  rpc SetResourceLimits(SetResourceLimitsRequest) returns (SetResourceLimitsResponse);

  // GetVersion returns the agent's build version.
  rpc GetVersion(GetVersionRequest) returns (GetVersionResponse);

  // Upgrade replaces the agent binary and re-execs (same PID 1, no process loss).
  // The worker writes the new binary to binary_path before calling this.
  rpc Upgrade(UpgradeRequest) returns (UpgradeResponse);
}

// --- Exec ---

message ExecRequest {
  string command = 1;
  repeated string args = 2;
  map<string, string> envs = 3;
  string cwd = 4;
  int32 timeout_seconds = 5; // 0 = default (60s)
  bool run_as_root = 6;      // if true, skip sandbox user credential (for internal/system ops)
}

message ExecResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
}

message ExecOutputChunk {
  enum Stream {
    STDOUT = 0;
    STDERR = 1;
  }
  Stream stream = 1;
  bytes data = 2;
}

// --- Filesystem ---

message ReadFileRequest {
  string path = 1;
}

message ReadFileResponse {
  bytes content = 1;
}

message WriteFileRequest {
  string path = 1;
  bytes content = 2;
  uint32 mode = 3; // file mode (0 = default 0644)
}

message WriteFileResponse {}

// --- Streaming Filesystem ---

message ReadFileStreamRequest {
  string path = 1;
}

message FileChunk {
  bytes data = 1;
  int64 total_size = 2; // set on first chunk only (0 on subsequent chunks)
}

message WriteFileStreamRequest {
  string path = 1;   // set on first message only
  bytes data = 2;
  uint32 mode = 3;   // set on first message only (0 = default 0644)
}

message WriteFileStreamResponse {
  int64 bytes_written = 1;
}

message ListDirRequest {
  string path = 1;
}

message DirEntry {
  string name = 1;
  bool is_dir = 2;
  int64 size = 3;
  string path = 4;
}

message ListDirResponse {
  repeated DirEntry entries = 1;
}

message MakeDirRequest {
  string path = 1;
}

message MakeDirResponse {}

message RemoveRequest {
  string path = 1;
}

message RemoveResponse {}

message ExistsRequest {
  string path = 1;
}

message ExistsResponse {
  bool exists = 1;
}

message StatRequest {
  string path = 1;
}

message StatResponse {
  string name = 1;
  bool is_dir = 2;
  int64 size = 3;
  string mode = 4;
  string mod_time = 5;
  string path = 6;
}

// --- Stats ---

message StatsRequest {}

message StatsResponse {
  double cpu_percent = 1;
  uint64 mem_usage = 2;   // bytes
  uint64 mem_limit = 3;   // bytes
  uint64 net_input = 4;   // bytes
  uint64 net_output = 5;  // bytes
  int32 pids = 6;
}

// --- Ping ---

message PingRequest {}

message PingResponse {
  string version = 1;
  int64 uptime_seconds = 2;
}

// --- PTY ---

message PTYCreateRequest {
  int32 cols = 1;
  int32 rows = 2;
  string shell = 3; // e.g., "/bin/bash" (empty = default)
}

message PTYCreateResponse {
  string session_id = 1;
  uint32 data_port = 2; // vsock port for raw PTY I/O stream
}

message PTYResizeRequest {
  string session_id = 1;
  int32 cols = 2;
  int32 rows = 3;
}

message PTYResizeResponse {}

message PTYKillRequest {
  string session_id = 1;
}

message PTYKillResponse {}

// PTYInput is a client→agent message for the PTYAttach bidi stream.
message PTYInput {
  string session_id = 1; // required on first message to identify the session
  bytes stdin = 2;       // raw bytes to write to the PTY
  int32 cols = 3;        // if > 0, resize the PTY
  int32 rows = 4;        // if > 0, resize the PTY
}

// PTYOutput is an agent→client message for the PTYAttach bidi stream.
message PTYOutput {
  bytes data = 1;       // raw bytes read from the PTY
  bool exited = 2;      // true when the PTY process has exited
  int32 exit_code = 3;  // only valid when exited = true
}

// --- Exec Sessions ---

message ExecSessionCreateRequest {
  string command = 1;
  repeated string args = 2;
  map<string, string> envs = 3;
  string cwd = 4;
  int32 timeout_seconds = 5;          // 0 = no timeout (run until exit/kill)
  int32 max_run_after_disconnect = 6; // seconds, 0 = run forever
  int32 scrollback_max_bytes = 7;     // 0 = default (1MB)
}

message ExecSessionCreateResponse {
  string session_id = 1;
}

message ExecSessionInput {
  string session_id = 1; // required on first message
  bytes stdin = 2;
}

message ExecSessionOutput {
  enum Type {
    STDOUT = 0;
    STDERR = 1;
    EXIT = 2;
    SCROLLBACK_END = 3;
  }
  Type type = 1;
  bytes data = 2;
  int32 exit_code = 3; // only set when type = EXIT
}

message ExecSessionListRequest {}
message ExecSessionListResponse {
  repeated ExecSessionInfo sessions = 1;
}

message ExecSessionInfo {
  string session_id = 1;
  string command = 2;
  repeated string args = 3;
  bool running = 4;
  int32 exit_code = 5;
  int64 started_at = 6;
  int32 attached_clients = 7;
}

message ExecSessionKillRequest {
  string session_id = 1;
  int32 signal = 2; // 0 = SIGKILL
}
message ExecSessionKillResponse {}

// --- SetEnvs ---

message SetEnvsRequest {
  map<string, string> envs = 1;
}

message SetEnvsResponse {}

// --- Shutdown ---

message ShutdownRequest {}

message ShutdownResponse {}

// --- SyncFS ---

message SyncFSRequest {}

message SyncFSResponse {}

// --- PrepareHibernate ---

message PrepareHibernateRequest {}

message PrepareHibernateResponse {}

// --- Resource Limits ---

message SetResourceLimitsRequest {
  int32 max_pids = 1;          // pids.max (0 = don't change)
  int64 max_memory_bytes = 2;  // memory.max (0 = don't change)
  int64 cpu_max_usec = 3;      // cpu.max quota (0 = don't change)
  int64 cpu_period_usec = 4;   // cpu.max period (0 = default 100000)
}

message SetResourceLimitsResponse {}

// --- Version + Upgrade ---

message GetVersionRequest {}

message GetVersionResponse {
  string version = 1;  // build version (git SHA or build timestamp)
}

message UpgradeRequest {
  string binary_path = 1;  // path to new agent binary inside the VM
}

message UpgradeResponse {
  bool ok = 1;
}
