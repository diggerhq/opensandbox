syntax = "proto3";

package worker;

option go_package = "github.com/opensandbox/opensandbox/proto/worker";

service SandboxWorker {
  rpc CreateSandbox(CreateSandboxRequest) returns (CreateSandboxResponse);
  rpc DestroySandbox(DestroySandboxRequest) returns (DestroySandboxResponse);
  rpc GetSandbox(GetSandboxRequest) returns (GetSandboxResponse);
  rpc ListSandboxes(ListSandboxesRequest) returns (ListSandboxesResponse);

  rpc ExecCommand(ExecCommandRequest) returns (ExecCommandResponse);
  rpc ExecCommandStream(ExecCommandRequest) returns (stream ExecOutputChunk);

  rpc ReadFile(ReadFileRequest) returns (ReadFileResponse);
  rpc WriteFile(WriteFileRequest) returns (WriteFileResponse);
  rpc ListDir(ListDirRequest) returns (ListDirResponse);

  rpc CreatePTY(CreatePTYRequest) returns (CreatePTYResponse);
  rpc PTYStream(stream PTYInput) returns (stream PTYOutput);

  rpc ExecSessionCreate(ExecSessionCreateRequest) returns (ExecSessionCreateResponse);
  rpc ExecSessionList(ExecSessionListRequest) returns (ExecSessionListResponse);
  rpc ExecSessionKill(ExecSessionKillRequest) returns (ExecSessionKillResponse);

  rpc HibernateSandbox(HibernateSandboxRequest) returns (HibernateSandboxResponse);
  rpc WakeSandbox(WakeSandboxRequest) returns (WakeSandboxResponse);

  rpc SaveAsTemplate(SaveAsTemplateRequest) returns (SaveAsTemplateResponse);

  rpc CreateCheckpoint(CreateCheckpointRequest) returns (CreateCheckpointResponse);
  rpc RestoreCheckpoint(RestoreCheckpointRequest) returns (RestoreCheckpointResponse);

  rpc BuildTemplate(BuildTemplateRequest) returns (BuildTemplateResponse);

  rpc GetSandboxStats(GetSandboxStatsRequest) returns (GetSandboxStatsResponse);

  rpc SetSandboxLimits(SetSandboxLimitsRequest) returns (SetSandboxLimitsResponse);

  // Live migration between workers
  rpc PreCopyDrives(PreCopyDrivesRequest) returns (PreCopyDrivesResponse);
  rpc PrepareMigrationIncoming(PrepareMigrationIncomingRequest) returns (PrepareMigrationIncomingResponse);
  rpc LiveMigrate(LiveMigrateRequest) returns (LiveMigrateResponse);
  rpc CompleteMigrationIncoming(CompleteMigrationIncomingRequest) returns (CompleteMigrationIncomingResponse);

  // Golden snapshot management
  rpc RebuildGoldenSnapshot(RebuildGoldenSnapshotRequest) returns (RebuildGoldenSnapshotResponse);
}

message CreateSandboxRequest {
  string template = 1;
  int32 timeout = 2;
  map<string, string> envs = 3;
  int32 memory_mb = 4;
  int32 cpu_count = 5;
  bool network_enabled = 6;
  string image_ref = 7;
  int32 port = 8;  // container port to expose via subdomain (default 80)
  // Sandbox snapshot template: if non-empty, boot from these S3 keys instead of base image.
  string template_rootfs_key = 9;
  string template_workspace_key = 10;
  // If set, attempt warm fork from local checkpoint snapshot (LoadSnapshot instead of cold boot).
  string checkpoint_id = 11;
  // Server-assigned sandbox ID. If non-empty, worker uses this instead of generating one.
  string sandbox_id = 12;
  // Egress allowlist: if non-empty, only these hosts can be reached.
  repeated string egress_allowlist = 13;
  // Per-secret host restrictions for secrets proxy.
  map<string, string> secret_allowed_hosts = 14;
  // Env vars resolved from a SecretStore. Sealed by the worker's secrets proxy
  // before injection into the VM. Disjoint from `envs` (which is plaintext).
  map<string, string> secret_envs = 15;
}

message CreateSandboxResponse {
  string sandbox_id = 1;
  string status = 2;
}

message DestroySandboxRequest {
  string sandbox_id = 1;
}

message DestroySandboxResponse {}

message GetSandboxRequest {
  string sandbox_id = 1;
}

message GetSandboxResponse {
  string sandbox_id = 1;
  string status = 2;
  string template = 3;
  int64 started_at = 4;
  int64 end_at = 5;
}

message ListSandboxesRequest {}

message ListSandboxesResponse {
  repeated GetSandboxResponse sandboxes = 1;
}

message ExecCommandRequest {
  string sandbox_id = 1;
  string command = 2;
  repeated string args = 3;
  map<string, string> envs = 4;
  string cwd = 5;
  int32 timeout = 6;
}

message ExecCommandResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
}

message ExecOutputChunk {
  enum Stream {
    STDOUT = 0;
    STDERR = 1;
  }
  Stream stream = 1;
  bytes data = 2;
}

message ReadFileRequest {
  string sandbox_id = 1;
  string path = 2;
}

message ReadFileResponse {
  bytes content = 1;
}

message WriteFileRequest {
  string sandbox_id = 1;
  string path = 2;
  bytes content = 3;
}

message WriteFileResponse {}

message ListDirRequest {
  string sandbox_id = 1;
  string path = 2;
}

message DirEntry {
  string name = 1;
  bool is_dir = 2;
  int64 size = 3;
  string path = 4;
}

message ListDirResponse {
  repeated DirEntry entries = 1;
}

message CreatePTYRequest {
  string sandbox_id = 1;
  int32 cols = 2;
  int32 rows = 3;
  string shell = 4;
}

message CreatePTYResponse {
  string session_id = 1;
}

message PTYInput {
  string session_id = 1;
  oneof input {
    bytes data = 2;
    PTYResize resize = 3;
  }
}

message PTYResize {
  int32 cols = 1;
  int32 rows = 2;
}

message PTYOutput {
  string session_id = 1;
  bytes data = 2;
}

message HibernateSandboxRequest {
  string sandbox_id = 1;
}

message HibernateSandboxResponse {
  string sandbox_id = 1;
  string checkpoint_key = 2;
  int64 size_bytes = 3;
}

message WakeSandboxRequest {
  string sandbox_id = 1;
  string checkpoint_key = 2;
  int32 timeout = 3;
}

message WakeSandboxResponse {
  string sandbox_id = 1;
  string status = 2;
}

message SaveAsTemplateRequest {
  string sandbox_id = 1;
  string template_id = 2;  // UUID assigned by control plane
}

message SaveAsTemplateResponse {
  string rootfs_s3_key = 1;
  string workspace_s3_key = 2;
}

message BuildTemplateRequest {
  string name = 1;
  string dockerfile = 2;
  string tag = 3;
  string ecr_image_ref = 4;
}

message BuildTemplateResponse {
  string image_ref = 1;
  string build_log = 2;
}

// --- Exec Sessions ---

message ExecSessionCreateRequest {
  string sandbox_id = 1;
  string command = 2;
  repeated string args = 3;
  map<string, string> envs = 4;
  string cwd = 5;
  int32 timeout_seconds = 6;
  int32 max_run_after_disconnect = 7;
}

message ExecSessionCreateResponse {
  string session_id = 1;
}

message ExecSessionListRequest {
  string sandbox_id = 1;
}

message ExecSessionListResponse {
  repeated ExecSessionInfoEntry sessions = 1;
}

message ExecSessionInfoEntry {
  string session_id = 1;
  string command = 2;
  repeated string args = 3;
  bool running = 4;
  int32 exit_code = 5;
  int64 started_at = 6;
  int32 attached_clients = 7;
}

message ExecSessionKillRequest {
  string sandbox_id = 1;
  string session_id = 2;
  int32 signal = 3;
}

message ExecSessionKillResponse {}

// --- Stats ---

message GetSandboxStatsRequest {
  string sandbox_id = 1;
}

message GetSandboxStatsResponse {
  double cpu_percent = 1;
  uint64 mem_usage = 2;
  uint64 mem_limit = 3;
  uint64 net_input = 4;
  uint64 net_output = 5;
  int32 pids = 6;
}

message CreateCheckpointRequest {
  string sandbox_id = 1;
  string checkpoint_id = 2;  // UUID assigned by control plane
  bool prepare_golden = 3;   // If true, prepare a golden snapshot from this checkpoint
}

message CreateCheckpointResponse {
  string rootfs_s3_key = 1;
  string workspace_s3_key = 2;
}

message RestoreCheckpointRequest {
  string sandbox_id = 1;
  string checkpoint_id = 2;
}

message RestoreCheckpointResponse {
  bool success = 1;
}

message SetSandboxLimitsRequest {
  string sandbox_id = 1;
  int32 max_pids = 2;
  int64 max_memory_bytes = 3;
  int64 cpu_max_usec = 4;
  int64 cpu_period_usec = 5;
}

message SetSandboxLimitsResponse {}

// Live migration messages
message PreCopyDrivesRequest {
  string sandbox_id = 1;
  bool flatten_rootfs = 2;   // if true, flatten qcow2 overlay before upload (cross-golden-version)
}

message PreCopyDrivesResponse {
  string rootfs_key = 1;       // S3 key for rootfs qcow2
  string workspace_key = 2;    // S3 key for workspace qcow2
  string golden_version = 3;   // golden version the sandbox was created from
}

message PrepareMigrationIncomingRequest {
  string sandbox_id = 1;
  string rootfs_path = 2;    // local path to rootfs on target (pre-copied)
  string workspace_path = 3; // local path to workspace on target (pre-copied)
  int32 cpu_count = 4;
  int32 memory_mb = 5;
  int32 guest_port = 6;
  string template = 7;
  string rootfs_s3_key = 8;     // if set, download from S3 instead of using local rootfs_path
  string workspace_s3_key = 9;  // if set, download from S3 instead of using local workspace_path
  bool overlay_mode = 10;       // if true, rootfs is thin overlay — rebase to local golden on target
  int32 target_memory_mb = 11;  // final memory after scale — worker checks capacity and reserves atomically
}

message PrepareMigrationIncomingResponse {
  string incoming_addr = 1;  // TCP address for source to migrate to (e.g. "10.100.1.7:49152")
  int32 host_port = 2;       // mapped host port on target worker
}

message LiveMigrateRequest {
  string sandbox_id = 1;
  string incoming_addr = 2;  // TCP address from PrepareMigrationIncoming
}

message LiveMigrateResponse {}

message CompleteMigrationIncomingRequest {
  string sandbox_id = 1;
}

message CompleteMigrationIncomingResponse {}

// Golden snapshot management
message RebuildGoldenSnapshotRequest {}

message RebuildGoldenSnapshotResponse {
  string old_version = 1;    // previous golden version (empty if none)
  string new_version = 2;    // new golden version after rebuild
}
