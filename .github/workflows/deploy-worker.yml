name: Deploy Worker (Hotfix)

# Emergency hotfix: SSH-deploy binaries to running workers without waiting for AMI build.
# For normal deploys, use build-worker-ami.yml which builds an immutable AMI.
on:
  workflow_dispatch:

env:
  SSH_USER: azureuser
  GOARCH: amd64

jobs:
  deploy:
    name: Build & Deploy Worker
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build worker binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=${{ env.GOARCH }} go build -o bin/opensandbox-worker ./cmd/worker/

      - name: Build agent binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=${{ env.GOARCH }} go build -o bin/osb-agent ./cmd/agent/

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Discover control plane
        run: |
          CP_IP=$(az vm list --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --show-details \
            --query "[?contains(name,'controlplane')].publicIps" -o tsv | head -1)
          echo "CP_IP=$CP_IP" >> $GITHUB_ENV
          echo "Discovered control plane: $CP_IP"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | base64 -d > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem
          echo -e "Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null" >> ~/.ssh/config
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY_B64 }}

      - name: Stage SSH key on control plane for worker access
        run: |
          scp -i ~/.ssh/deploy.pem ~/.ssh/deploy.pem \
            ${{ env.SSH_USER }}@${{ env.CP_IP }}:/tmp/deploy.pem
          ssh -i ~/.ssh/deploy.pem ${{ env.SSH_USER }}@${{ env.CP_IP }} 'chmod 600 /tmp/deploy.pem'

      - name: Upload binaries and rootfs context to control plane
        run: |
          # Upload binaries to control plane as staging area
          scp -i ~/.ssh/deploy.pem bin/opensandbox-worker bin/osb-agent \
            ${{ env.SSH_USER }}@${{ env.CP_IP }}:/tmp/

          # Sync rootfs build context
          rsync -az \
            -e "ssh -i ~/.ssh/deploy.pem" \
            --include='deploy/ec2/build-rootfs-docker.sh' \
            --include='deploy/firecracker/rootfs/***' \
            --include='scripts/claude-agent-wrapper/***' \
            --include='deploy/' \
            --include='deploy/ec2/' \
            --include='deploy/firecracker/' \
            --include='scripts/' \
            --exclude='*' \
            ./ ${{ env.SSH_USER }}@${{ env.CP_IP }}:/tmp/osb-rootfs-ctx/

      - name: Discover workers and deploy
        run: |
          ssh -i ~/.ssh/deploy.pem ${{ env.SSH_USER }}@${{ env.CP_IP }} '
            set -euo pipefail

            API_KEY=$(grep OPENSANDBOX_API_KEY /etc/opensandbox/server.env | cut -d= -f2-)

            # Get all worker private IPs from the control plane API
            WORKER_IPS=$(curl -sf -H "X-API-Key: $API_KEY" http://localhost:8080/api/workers \
              | jq -r ".[].http_addr" | sed "s|http://||;s|:.*||")

            if [ -z "$WORKER_IPS" ]; then
              echo "ERROR: No workers found"
              exit 1
            fi

            echo "Found workers:"
            echo "$WORKER_IPS"

            # Deploy to each worker
            for IP in $WORKER_IPS; do
              echo ""
              echo "=== Deploying to worker $IP ==="

              # Copy binaries from control plane to worker (via private network)
              scp -i /tmp/deploy.pem -o StrictHostKeyChecking=no /tmp/opensandbox-worker /tmp/osb-agent \
                '"${{ env.SSH_USER }}"'@${IP}:/tmp/

              # Copy rootfs build context
              rsync -az -e "ssh -i /tmp/deploy.pem -o StrictHostKeyChecking=no" \
                /tmp/osb-rootfs-ctx/ '"${{ env.SSH_USER }}"'@${IP}:/tmp/osb-rootfs-ctx/

              # Install and restart on worker
              ssh -i /tmp/deploy.pem -o StrictHostKeyChecking=no '"${{ env.SSH_USER }}"'@${IP} "
                set -euo pipefail

                # Install binaries
                sudo mv /tmp/opensandbox-worker /usr/local/bin/opensandbox-worker
                sudo chmod +x /usr/local/bin/opensandbox-worker
                sudo mv /tmp/osb-agent /usr/local/bin/osb-agent
                sudo chmod +x /usr/local/bin/osb-agent

                # Rebuild rootfs with new agent
                IMAGES_DIR=\$(grep OPENSANDBOX_IMAGES_DIR /etc/opensandbox/worker.env 2>/dev/null | cut -d= -f2- || echo '/data/firecracker/images')
                IMAGES_DIR=\"\${IMAGES_DIR:-/data/firecracker/images}\"
                echo \"Rebuilding rootfs in \$IMAGES_DIR\"
                cd /tmp/osb-rootfs-ctx
                sudo rm -f \"\$IMAGES_DIR/default.ext4\"
                sudo bash deploy/ec2/build-rootfs-docker.sh /usr/local/bin/osb-agent \"\$IMAGES_DIR\" default

                # Delete golden snapshot so it rebuilds with new agent
                DATA_DIR=\$(grep OPENSANDBOX_DATA_DIR /etc/opensandbox/worker.env 2>/dev/null | cut -d= -f2- || echo '/data/sandboxes')
                sudo rm -rf \"\${DATA_DIR}/golden\" 2>/dev/null || true

                # Cleanup
                rm -rf /tmp/osb-rootfs-ctx

                # Restart worker
                sudo systemctl restart opensandbox-worker
                echo \"Worker on \$(hostname) deployed and restarted\"
              "

              # Verify
              sleep 3
              ssh -i /tmp/deploy.pem -o StrictHostKeyChecking=no '"${{ env.SSH_USER }}"'@${IP} \
                "sudo systemctl is-active opensandbox-worker"
              echo "=== Worker $IP: OK ==="
            done

            # Cleanup staging on control plane
            rm -f /tmp/opensandbox-worker /tmp/osb-agent /tmp/deploy.pem
            rm -rf /tmp/osb-rootfs-ctx
          '

      - name: Summary
        run: echo "Worker deployment complete!"
